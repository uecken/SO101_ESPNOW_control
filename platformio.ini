[env:m5stick-c]
platform = espressif32@6.9.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
lib_extra_dirs = lib
build_flags =
    -D CONFIG_UART_ISR_IN_IRAM=1
    -D BOARD_M5STICKC=1
    -D PIN_TXD=32
    -D PIN_RXD=33
    -D PIN_TXD2=26
    -D PIN_RXD2=36
lib_deps =
    m5stack/M5StickC

[env:m5stack-atoms3]
platform = espressif32@6.9.0
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
lib_extra_dirs = lib
build_flags =
    -D CONFIG_UART_ISR_IN_IRAM=1
    -D BOARD_ATOMS3=1
    -D PIN_TXD=2
    -D PIN_RXD=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ESP32-C6: requires Arduino v3 (pioarduino). NOT supported on espressif32@6.9.0 (Arduino v2).
; ESP-IDF 4.4 does not include C6 support; C6 was added in ESP-IDF 5.0+ (2023).
; Status: UNTESTED. Build with PowerShell/CMD only (Git Bash incompatible with pioarduino).
[env:xiao-esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
lib_extra_dirs = lib
build_flags =
    -D CONFIG_UART_ISR_IN_IRAM=1
    -D BOARD_XIAO_ESP32C6=1
    -D PIN_TXD=16
    -D PIN_RXD=17
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env:xiao-esp32c3-scs-recognize]
platform = espressif32@6.9.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
lib_extra_dirs = lib
build_flags =
    -D CONFIG_UART_ISR_IN_IRAM=1
    -D BOARD_XIAO_ESP32C3=1
    -D PIN_TXD=21
    -D PIN_RXD=20
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
